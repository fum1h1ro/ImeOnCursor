name: BezelHue
options:
  bundleIdPrefix: com.k-ya
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15"
  generateEmptyDirectories: true
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_APP_SANDBOX: NO
targets:
  BezelHue:
    type: application
    platform: macOS
    sources:
      - path: Sources/BezelHue
    resources:
      - path: Resources
    info:
      path: Resources/Info.plist
      properties:
        LSUIElement: true
        NSAccessibilityUsageDescription: "マウス位置をグローバルに追跡するためにアクセシビリティが必要です"
        LSMinimumSystemVersion: "13.0"
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundlePackageType: APPL
    entitlements:
      path: BezelHue.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fum1h1ro.BezelHue

schemes:
  BezelHue:
    build:
      targets:
        BezelHue: all
    run:
      config: Debug
    archive:
      config: Release
